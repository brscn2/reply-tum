services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: schatten
      POSTGRES_PASSWORD: schatten
      POSTGRES_DB: schatten
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schatten"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  moodle_watcher:
    build: .
    command: python -m agents.moodle_watcher
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  deadline_sentinel:
    build: .
    command: python -m agents.deadline_sentinel
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  calendar_sync:
    build: .
    command: python -m agents.calendar_sync
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  social_scout:
    build: .
    command: python -m agents.social_scout
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  study_planner:
    build: .
    command: python -m agents.study_planner
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
